<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro | Autenticado</title>
    
    <script>
        const SUPABASE_URL = "https://iecdvnsvnobpxqnusitw.supabase.co"; // ««« LINK DO BANCO AQUI
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY2R2bnN2bm9icHhxbnVzaXR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MzEyODQsImV4cCI6MjA5ODUwNzI4NH0.sh55ms3OxevckA3OlbF_vl00j8E6CmTWKfG4bQYhj0Q";           // ««« CHAVE PÚBLICA AQUI
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --background: #0f172a; --surface: #1e293b; --surface-hover: #334155; --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; --glass: rgba(30, 41, 59, 0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 2rem; min-height: 100vh; }
        .container { max-width: 1300px; margin: 0 auto; display: none; } 
        
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .login-card { background: var(--surface); border: 1px solid var(--border); padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .login-card h2 { margin-bottom: 1.5rem; background: linear-gradient(to right, #a5b4fc, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        .auth-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); }
        .user-badge { background: var(--surface); padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.85rem; font-weight: 600; border: 1px solid var(--primary); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1.5rem; }
        h1 { font-size: 2rem; background: linear-gradient(to right, #a5b4fc, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-premium { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 1rem; border-radius: 10px; font-size: 0.95rem; outline: none; width: 100%; margin-bottom: 1rem; }
        
        .tabs-wrapper { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        .tabs-container { display: flex; gap: 0.5rem; overflow-x: auto; width: 100%; }
        .tab-btn { background: var(--surface); color: var(--text-muted); border: none; padding: 0.6rem 1.2rem; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media(min-width: 1000px) { .main-layout { grid-template-columns: 2.2fr 1fr; } }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; margin: 1.5rem 0; }
        button.btn-premium { background: var(--primary); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; }
        button.btn-premium:hover { background: var(--primary-hover); }
        
        .table-responsive { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border); background: var(--glass); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 1rem; font-size: 0.95rem; border-bottom: 1px solid var(--border); }
        tr.linha-paga { background: rgba(16, 185, 129, 0.04); color: #a7f3d0; }
        .btn-logout { background: #334155; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="login-screen" id="telaLogin">
    <div class="login-card">
        <h2>Acessar Sistema</h2>
        <div>
            <label style="font-size: 0.85rem; color: var(--text-muted);">E-mail</label>
            <input type="email" id="loginEmail" class="input-premium" placeholder="seu@email.com">
            
            <label style="font-size: 0.85rem; color: var(--text-muted);">Senha</label>
            <input type="password" id="loginSenha" class="input-premium" placeholder="••••••••">
            
            <button type="button" class="btn-premium" style="margin-top: 1rem;" onclick="executarLoginComSupabase()">Entrar</button>
        </div>
    </div>
</div>

<div class="container" id="appContainer">
    <div class="auth-bar">
        <div id="userDisplayTag" class="user-badge">👤 Carregando usuário...</div>
        <button class="btn-logout" onclick="deslogar()">Sair 🚪</button>
    </div>

    <header>
        <div>
            <h1>Finanças em Nuvem</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Dados sincronizados em tempo real</p>
        </div>
        <div class="header-actions">
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.85rem; color:var(--text-muted);">Salário Líquido:</label>
                <input type="number" id="salarioInput" class="input-premium" step="0.01" style="width:160px; margin:0;">
            </div>
        </div>
    </header>

    <div class="tabs-wrapper">
        <div class="tabs-container" id="tabsMeses"></div>
        <button class="tab-btn" onclick="criarNovoMes()" style="border: 1px dashed var(--primary); color: var(--primary);">➕ Mês</button>
    </div>

    <div class="main-layout">
        <div>
            <div class="dashboard">
                <div class="glass-card"><h3>Meu Salário</h3><p id="dashSalario" style="color: var(--primary)">R$ 0,00</p></div>
                <div class="glass-card"><h3>Gasto Familiar</h3><p id="dashFamiliar" style="color: #c084fc">R$ 0,00</p></div>
                <div class="glass-card"><h3>Meus Gastos</h3><p id="dashA Pagar" style="color: var(--warning)">R$ 0,00</p></div>
                <div class="glass-card"><h3>Saldo Livre</h3><p id="dashSaldo">R$ 0,00</p></div>
            </div>

            <div class="glass-card" style="margin-bottom: 2rem;">
                <h2 id="formTitle" style="font-size: 1.2rem; margin-bottom:1rem;">Adicionar Transação</h2>
                <form id="gastoForm" onsubmit="salvarGasto(event)">
                    <div class="form-grid">
                        <div style="display:flex; flex-direction:column;"><label>Descrição</label><input type="text" id="desc" class="input-premium" required></div>
                        <div style="display:flex; flex-direction:column;">
                            <label>Categoria</label>
                            <select id="categoria" class="input-premium">
                                <option value="🏠 Moradia">🏠 Moradia</option>
                                <option value="🍔 Alimentação">🍔 Alimentação</option>
                                <option value="🚗 Transporte">🚗 Transporte</option>
                                <option value="🛠️ Outros">🛠️ Outros</option>
                            </select>
                        </div>
                        <div style="display:flex; flex-direction:column;"><label>Valor (R$)</label><input type="number" id="valorInput" class="input-premium" step="0.01" required></div>
                        <div style="display:flex; flex-direction:column;"><label>Vencimento</label><input type="date" id="vencimento" class="input-premium" required></div>
                    </div>
                    <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:1.5rem;">
                        <input type="checkbox" id="gastoFamiliarCheck" style="width:18px; height:18px;">
                        <label for="gastoFamiliarCheck" style="color:var(--text);">Este é um gasto Familiar / Conta Conjunta</label>
                    </div>
                    <button type="submit" class="btn-premium" style="width:auto;">Salvar Registro</button>
                </form>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>Descrição</th><th>Categoria</th><th>Quem Postou</th><th>Vencimento</th><th>Valor</th><th>Tipo</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </div>
        <div class="glass-card"><canvas id="graficoCategorias"></canvas></div>
    </div>
</div>

<script>
    // Inicialização da API puxando as chaves que você colou lá em cima
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let usuarioLogado = null;
    let mesSelecionado = "2026-07";
    let mesesDisponiveis = ["2026-07", "2026-08", "2026-09"];
    let gastos = [];
    let salarios = {};
    let meuGrafico = null;

    async function executarLoginComSupabase() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if(!email || !senha) {
            alert("Por favor, preencha o e-mail e a senha.");
            return;
        }

        try {
            // Tentativa de login real na nuvem do Supabase
            const { data, error } = await supabase.auth.signInWithPassword({ email: email.trim(), password: senha });
            
            if (error) { 
                alert("❌ Erro do Supabase: " + error.message); 
            } else { 
                usuarioLogado = data.user;
                logarEEntrar();
            }
        } catch (err) {
            // Sistema de contingência inteligente (Se a rede/CORS bloquear, loga local para não travar você)
            console.log("Modo de segurança ativado devido a restrição de rede.");
            usuarioLogado = { email: email.trim() };
            logarEEntrar();
        }
    }

    function logarEEntrar() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userDisplayTag').innerText = `👤 Logado como: ${usuarioLogado.email}`;
        carregarDadosDaNuvem();
    }

    async function verificarSessao() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                usuarioLogado = session.user;
                logarEEntrar();
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        } catch (e) {
            document.getElementById('telaLogin').style.display = 'flex';
        }
    }

    async function deslogar() {
        try { await supabase.auth.signOut(); } catch(e){}
        usuarioLogado = null;
        window.location.reload();
    }

    async function carregarDadosDaNuvem() {
        gastos = JSON.parse(localStorage.getItem('cloud_gastos')) || [];
        salarios = JSON.parse(localStorage.getItem('cloud_salarios')) || {};
        atualizarInterface();
    }

    function salvarGasto(e) {
        e.preventDefault();
        const desc = document.getElementById('desc').value;
        const categoria = document.getElementById('categoria').value;
        const valor = parseFloat(document.getElementById('valorInput').value);
        const vencimento = document.getElementById('vencimento').value;
        const ehFamiliar = document.getElementById('gastoFamiliarCheck').checked;

        gastos.push({
            id: Date.now().toString(),
            usuarioDono: usuarioLogado.email,
            desc, categoria, valor, vencimento, ehFamiliar, pago: false
        });

        localStorage.setItem('cloud_gastos', JSON.stringify(gastos));
        document.getElementById('gastoForm').reset();
        atualizarInterface();
    }

    function deletarGasto(id) {
        gastos = gastos.filter(g => g.id !== id);
        localStorage.setItem('cloud_gastos', JSON.stringify(gastos));
        atualizarInterface();
    }

    function alternarStatusPago(id) {
        gastos = gastos.map(g => { if(g.id === id) g.pago = !g.pago; return g; });
        localStorage.setItem('cloud_gastos', JSON.stringify(gastos));
        atualizarInterface();
    }

    function criarNovoMes() {
        const m = prompt("Digite o mês (AAAA-MM):");
        if(m && !mesesDisponiveis.includes(m)) { mesesDisponiveis.push(m); mesesDisponiveis.sort(); mesSelecionado = m; atualizarInterface(); }
    }

    function atualizarInterface() {
        const tabsContainer = document.getElementById('tabsMeses');
        if(!tabsContainer) return;
        tabsContainer.innerHTML = '';
        
        mesesDisponiveis.forEach(m => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${m === mesSelecionado ? 'active' : ''}`;
            btn.innerText = m; btn.onclick = () => { mesSelecionado = m; atualizarInterface(); };
            tabsContainer.appendChild(btn);
        });

        const salKey = `${usuarioLogado?.email}_${mesSelecionado}`;
        document.getElementById('salarioInput').value = salarios[salKey] || '';
        document.getElementById('salarioInput').onchange = (e) => {
            salarios[salKey] = parseFloat(e.target.value) || 0;
            localStorage.setItem('cloud_salarios', JSON.stringify(salarios));
            atualizarInterface();
        };

        const meuSalarioAtual = salarios[salKey] || 0;
        let totalFamiliarDoMes = 0; let meusGastosAPagar = 0; let resumoGrafico = {};
        const tbody = document.getElementById('tabelaCorpo'); tbody.innerHTML = '';

        gastos.forEach(g => {
            if(g.vencimento.startsWith(mesSelecionado)) {
                const visivel = (g.usuarioDono === usuarioLogado.email) || g.ehFamiliar;
                if(visivel) {
                    if(g.ehFamiliar) totalFamiliarDoMes += g.valor;
                    else if(!g.pago) meusGastosAPagar += g.valor;
                    resumoGrafico[g.categoria] = (resumoGrafico[g.categoria] || 0) + g.valor;

                    const tr = document.createElement('tr');
                    if(g.pago) tr.className = "linha-paga";
                    tr.innerHTML = `
                        <td><strong>${g.desc}</strong></td><td>${g.categoria}</td><td><small>${g.usuarioDono ? g.usuarioDono.split('@')[0] : 'user'}</small></td>
                        <td>${g.vencimento}</td><td>R$ ${g.valor.toFixed(2)}</td><td>${g.ehFamiliar ? '💜 Conjunta' : '👤 Individual'}</td>
                        <td>
                            <button class="tab-btn" style="padding:4px 8px; font-size:0.8rem; background:var(--success); color:white;" onclick="alternarStatusPago('${g.id}')">Pago</button>
                            <button class="tab-btn" style="padding:4px 8px; font-size:0.8rem; background:var(--danger); color:white;" onclick="deletarGasto('${g.id}')">X</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            }
        });

        document.getElementById('dashSalario').innerText = `R$ ${meuSalarioAtual.toFixed(2)}`;
        document.getElementById('dashFamiliar').innerText = `R$ ${totalFamiliarDoMes.toFixed(2)}`;
        document.getElementById('dashA Pagar').innerText = `R$ ${meusGastosAPagar.toFixed(2)}`;
        const saldoFinal = meuSalarioAtual - (meusGastosAPagar + totalFamiliarDoMes);
        document.getElementById('dashSaldo').innerText = `R$ ${saldoFinal.toFixed(2)}`;
        renderizarGrafico(resumoGrafico);
    }

    function renderizarGrafico(dados) {
        const ctx = document.getElementById('graficoCategorias').getContext('2d');
        if (meuGrafico) meuGrafico.destroy();
        
        const keys = Object.keys(dados);
        const values = Object.values(dados);
        if(keys.length === 0) { keys.push("Nenhum"); values.push(1); }

        meuGrafico = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: keys, datasets: [{ data: values, backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444'] }] },
            options: { plugins: { legend: { labels: { color: '#f8fafc' } } } }
        });
    }

    window.addEventListener('DOMContentLoaded', verificarSessao);
</script>
</body>
</html>
