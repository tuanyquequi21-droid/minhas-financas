<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Carteira | Finanças</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Variáveis de Cores para Troca de Tema */
        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --card-familiar-bg: #faf5ff;
            --card-apagar-bg: #fef2f2;
            --card-saldo-bg: #ecfdf5;
            --pill-inactive: #e2e8f0;
            --pill-text-inactive: #475569;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --card-familiar-bg: #2e1065;
            --card-apagar-bg: #451a03;
            --card-saldo-bg: #064e3b;
            --pill-inactive: #334155;
            --pill-text-inactive: #94a3b8;
        }

        :root {
            --primary: #1e3a8a;
            --success: #10b981;
            --danger: #ef4444;
            --purple: #8b5cf6;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 0;
            transition: background 0.3s, color 0.3s;
            font-size: 0.9rem; /* Reduzido globalmente */
        }

        /* 🔐 TELA DE LOGIN RESPONSIVA COMCAPTA */
        .login-wrapper {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 15px; box-sizing: border-box;
        }
        .login-card { 
            width: 100%; max-width: 360px; background: var(--surface); 
            padding: 25px; border-radius: 12px; border: 1px solid var(--border);
        }

        /* HEADER SLIM */
        .app-header {
            background: var(--surface); padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 📅 CARROSSEL DE MESES COMPACTO */
        .months-carousel-container {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface); padding: 8px 15px;
            border-bottom: 1px solid var(--border);
        }
        .months-carousel {
            display: flex; gap: 6px; overflow-x: auto;
            scroll-behavior: smooth; flex-grow: 1;
            padding-bottom: 3px;
        }
        .months-carousel::-webkit-scrollbar { display: none; }
        .months-carousel { -ms-overflow-style: none; scrollbar-width: none; }

        .month-pill {
            padding: 6px 14px; border-radius: 15px; border: none;
            background: var(--pill-inactive); color: var(--pill-text-inactive);
            font-weight: 600; font-size: 0.8rem; white-space: nowrap; cursor: pointer;
        }
        .month-pill.active { background: var(--success); color: #0f172a; }

        /* DASHBOARD CARDS COMPACTOS */
        .main-container { padding: 12px; max-width: 1200px; margin: 0 auto; box-sizing: border-box; }
        .grid-dash { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        @media(min-width: 600px) { .grid-dash { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1000px) { .grid-dash { grid-template-columns: repeat(4, 1fr); } }

        .card-dash { background: var(--surface); padding: 14px; border-radius: 10px; border: 1px solid var(--border); }
        .card-dash h3 { margin: 0 0 3px 0; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        .card-dash p { margin: 0; font-size: 1.35rem; font-weight: 700; }
        
        .card-salario { border-left: 4px solid var(--success); }
        .card-salario input {
            width: 100%; font-size: 1.35rem; font-weight: 700; color: var(--text-main);
            background: transparent; border: none; outline: none;
        }
        .card-familiar { border-left: 4px solid var(--purple); background: var(--card-familiar-bg); }
        .card-familiar p { color: var(--purple); }
        .card-apagar { border-left: 4px solid var(--danger); background: var(--card-apagar-bg); }
        .card-apagar p { color: var(--danger); }
        .card-saldo { border-left: 4px solid var(--success); background: var(--card-saldo-bg); }
        .card-saldo p { color: var(--success); }

        /* INPUTS E FORMULÁRIOS AJUSTADOS */
        .flex-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 900px) { .flex-layout { grid-template-columns: 1.2fr 0.8fr; } }
        
        .section-card { background: var(--surface); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 4px; font-weight: 600; font-size: 0.8rem; }
        input, select, .btn-action {
            padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text-main); font-size: 0.9rem; box-sizing: border-box;
        }
        button { cursor: pointer; font-weight: bold; }

        /* TABELA SLIM (VIRA CARDS NO CELULAR) */
        .table-wrapper { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        th { background: var(--border); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; }

        @media (max-width: 760px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid var(--border); margin-bottom: 8px; border-radius: 6px; padding: 8px; background: var(--surface); }
            td { border: none; padding: 4px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
            td::before { content: attr(data-label); font-weight: bold; color: var(--text-muted); margin-right: 10px; }
        }
        .linha-paga { opacity: 0.3; text-decoration: line-through; }
    </style>
</head>
<body>

    <div id="telaLogin" class="login-wrapper">
        <div class="login-card">
            <h3 style="margin: 0 0 15px 0; text-align: center; color: var(--text-main);">Acessar Carteira</h3>
            <div class="input-group">
                <label>E-mail:</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label>Senha:</label>
                <input type="password" id="loginSenha" placeholder="••••••••" required>
            </div>
            <button type="button" id="btnLogar" style="width:100%; background:var(--primary); color:white; border:none; padding:10px; border-radius:6px; font-size:0.9rem;">Entrar</button>
        </div>
    </div>

    <div id="appContainer" style="display: none;">
        <header class="app-header">
            <span id="userDisplayTag" style="font-size: 0.85rem; font-weight: 600;">👤 Carregando...</span>
            <div style="display: flex; gap: 8px;">
                <button type="button" id="btnTema" style="background:transparent; border:1px solid var(--border); color:var(--text-main); padding:5px 10px; border-radius:5px; font-size:0.8rem;">🌓 Tema</button>
                <button type="button" id="btnDeslogar" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.8rem;">Sair</button>
            </div>
        </header>

        <div class="months-carousel-container">
            <button type="button" onclick="scrollCarrossel(-80)" style="background:transparent; border:none; color:var(--text-main); font-size:1rem;">◀</button>
            <div class="months-carousel" id="tabsMeses"></div>
            <button type="button" onclick="scrollCarrossel(80)" style="background:transparent; border:none; color:var(--text-main); font-size:1rem;">▶</button>
            <button type="button" id="btnNovoMes" style="background:var(--text-main); color:var(--bg); border:none; padding:5px 10px; border-radius:15px; font-size:0.75rem; white-space:nowrap;">+ Mês</button>
        </div>

        <main class="main-container">
            <div class="grid-dash">
                <div class="card-dash card-salario">
                    <h3>Minha Renda</h3>
                    <input type="number" id="salarioInput" placeholder="R$ 0,00">
                </div>
                <div class="card-dash card-familiar">
                    <h3>Contas Conjuntas</h3>
                    <p id="dashFamiliar">R$ 0,00</p>
                </div>
                <div class="card-dash card-apagar">
                    <h3>Contas A Pagar</h3>
                    <p id="dashAPagar">R$ 0,00</p>
                </div>
                <div class="card-dash card-saldo">
                    <h3>Saldo Restante</h3>
                    <p id="dashSaldo">R$ 0,00</p>
                </div>
            </div>

            <div class="flex-layout">
                <div class="section-card">
                    <h3 style="margin-top:0; font-size:1rem; margin-bottom:12px;">Novo Lançamento</h3>
                    <form id="gastoForm">
                        <div class="input-group">
                            <label>Descrição</label>
                            <input type="text" id="desc" placeholder="Ex: Internet, Aluguel" required>
                        </div>
                        <div class="input-group">
                            <label>Categoria</label>
                            <select id="categoria">
                                <option value="Moradia">Moradia</option>
                                <option value="Alimentação">Alimentação</option>
                                <option value="Transporte">Transporte</option>
                                <option value="Lazer">Lazer</option>
                                <option value="Saúde">Saúde</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Vencimento</label>
                            <input type="date" id="vencimento" required>
                        </div>
                        <div class="input-group">
                            <label>Tipo de Registro</label>
                            <select id="tipoContaSelect">
                                <option value="normal">À Vista / Único</option>
                                <option value="parcelado">Parcelado</option>
                                <option value="recorrente">Fixo Mensal (Recorrente)</option>
                            </select>
                        </div>

                        <div id="camposParcelas" style="display:none; gap:8px; background:var(--bg); padding:8px; border-radius:6px; margin-bottom:10px;">
                            <div class="input-group" style="margin:0; width:50%;">
                                <label>Parcelas</label>
                                <input type="number" id="qtdParcelasInput" value="2" min="2">
                            </div>
                            <div class="input-group" style="margin:0; width:50%;">
                                <label>Valor Parcela</label>
                                <input type="number" id="valorParcelaInput" placeholder="0.00" step="0.01">
                            </div>
                        </div>

                        <div class="input-group" id="campoValorNormal">
                            <label>Valor</label>
                            <input type="number" id="valorInput" placeholder="0.00" step="0.01" required>
                        </div>

                        <div style="margin: 10px 0; display:flex; align-items:center; gap:6px;">
                            <input type="checkbox" id="gastoFamiliarCheck" style="width:16px; height:16px;">
                            <label for="gastoFamiliarCheck" style="color:var(--purple); font-weight:bold; font-size:0.8rem;">💜 Conta Conjunta / Familiar</label>
                        </div>

                        <button type="submit" style="width:100%; background:var(--success); color:#0f172a; border:none; padding:10px; border-radius:6px; font-size:0.9rem;">Salvar Lançamento</button>
                    </form>
                </div>

                <div class="section-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height: 200px;">
                    <h3 style="margin-top:0; width:100%; font-size:1rem; margin-bottom:12px;">Resumo de Gastos</h3>
                    <div style="width:100%; max-width:180px;">
                        <canvas id="graficoCategorias"></canvas>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Categoria</th>
                            <th>Vencimento</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btnLogar')?.addEventListener('click', () => { if(typeof executarLogin === 'function') executarLogin(); });
            document.getElementById('btnDeslogar')?.addEventListener('click', () => { if(typeof deslogar === 'function') deslogar(); });
            document.getElementById('btnNovoMes')?.addEventListener('click', () => { if(typeof criarNovoMes === 'function') criarNovoMes(); });
            
            document.getElementById('btnTema')?.addEventListener('click', () => {
                const html = document.documentElement;
                const atual = html.getAttribute('data-theme');
                const novo = atual === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', novo);
                localStorage.setItem('theme_preference', novo);
            });
            const salvo = localStorage.getItem('theme_preference') || 'dark';
            document.documentElement.setAttribute('data-theme', salvo);
        });

        function scrollCarrossel(valor) {
            document.getElementById('tabsMeses').scrollLeft += valor;
        }
    </script>
    <script src="./app.js?v=21"></script>
</body>
</html>
